name: MERN DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend Dependencies
        run: |
          cd TODO/todo_backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd TODO/todo_frontend
          npm install

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./TODO/todo_backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo_backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./TODO/todo_frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo_frontend:latest