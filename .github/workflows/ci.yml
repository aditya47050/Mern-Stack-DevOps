name: MERN DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Backend Dependencies
        run: |
          cd TODO/todo_backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd TODO/todo_frontend
          npm install

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./TODO/todo_backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo_backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./TODO/todo_frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/todo_frontend:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/todo_backend:latest
            sudo docker pull ${{ secrets.DOCKER_USERNAME }}/todo_frontend:latest

            sudo docker stop $(sudo docker ps -q --filter ancestor=${{ secrets.DOCKER_USERNAME }}/todo_backend) || true
            sudo docker stop $(sudo docker ps -q --filter ancestor=${{ secrets.DOCKER_USERNAME }}/todo_frontend) || true

            sudo docker rm $(sudo docker ps -aq --filter ancestor=${{ secrets.DOCKER_USERNAME }}/todo_backend) || true
            sudo docker rm $(sudo docker ps -aq --filter ancestor=${{ secrets.DOCKER_USERNAME }}/todo_frontend) || true

            sudo docker run -d -p 3001:3001 \
            -e PORT=3001 \
            -e MONGO_URI="${{ secrets.MONGO_URI }}" \
            ${{ secrets.DOCKER_USERNAME }}/todo_backend:latest

            sudo docker run -d -p 80:3000 \
            ${{ secrets.DOCKER_USERNAME }}/todo_frontend:latest