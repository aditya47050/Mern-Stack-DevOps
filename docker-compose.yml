services:

  backend:
    build: ./TODO/todo_backend
    ports:
      - "3001:3001"
    env_file:
      - ./TODO/todo_backend/.env

  frontend:
    build: ./TODO/todo_frontend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend